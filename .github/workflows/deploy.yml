name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Copy uploaded asset folders
        run: |
          mkdir -p dist/cv dist/media
          if [ -d cv ]; then cp -r cv/. dist/cv/; fi
          if [ -d about ]; then mkdir -p dist/media/about && cp -r about/. dist/media/about/; fi
          if [ -d hero ]; then mkdir -p dist/media/hero && cp -r hero/. dist/media/hero/; fi
          if [ -d logo ]; then mkdir -p dist/media/logo && cp -r logo/. dist/media/logo/; fi
          if [ -d origin ]; then mkdir -p dist/media/origin && cp -r origin/. dist/media/origin/; fi
          if [ -d projects ]; then mkdir -p dist/media/projects && cp -r projects/. dist/media/projects/; fi
          if [ -d reference ]; then mkdir -p dist/media/reference && cp -r reference/. dist/media/reference/; fi

      - name: Prepare SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
